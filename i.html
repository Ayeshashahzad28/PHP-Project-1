<!DOCTYPE html>
<html>
<head>
<style>

body{
    background:#16243a;
    padding:50px;
    font-family:Arial;
}

/* container */
.inputBox{
    position:relative;
    width:400px;
}

/* input */
.inputBox input{
    width:100%;
    padding:14px;
    border:2px solid #39ff14;
    border-radius:8px;
    background:transparent;
    color:white;
    font-size:16px;
    outline:none;
}

/* floating text */
.inputBox label{
    position:absolute;
    left:14px;
    top:14px;
    color:#39ff14;
    background:#16243a;
    padding:0 6px;
    transition:0.3s;
    pointer-events:none;
}

/* animation */
.inputBox input:focus + label,
.inputBox input:valid + label{
    top:-10px;
    font-size:12px;
}

</style>
</head>

<body>

<div class="inputBox">
<input type="text" required>
<label>Enter your name</label>
</div>

</body>
</html>
